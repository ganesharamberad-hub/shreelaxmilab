<!DOCTYPE html>
<html>
<head>
  <title>Shree Laxmi Laboratory</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
  <h2>Shree Laxmi Laboratory</h2>
  <h3>Enter Mobile Number</h3>

  <input type="text" id="phone" placeholder="Enter Mobile Number">
  <input type="text" id="name" placeholder="Enter Your Name">
  <button onclick="login()">Continue</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, setDoc } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCfIW14dQ3WOoFuq-Ux-XTQ9YULT2fZKsU",
  authDomain: "shreelaxmilab-62bd2.firebaseapp.com",
  projectId: "shreelaxmilab-62bd2",
  storageBucket: "shreelaxmilab-62bd2.firebasestorage.app",
  messagingSenderId: "928372887275",
  appId: "1:928372887275:web:854071c5d19f1388e638ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.login = async function() {
  const phone = document.getElementById("phone").value;
  const name = document.getElementById("name").value;

  if(phone === "" || name === "") {
    alert("Please fill all fields");
    return;
  }

  await setDoc(doc(db, "users", phone), {
    name: name,
    phone: phone,
    createdAt: new Date()
  });

  localStorage.setItem("userName", name);
  window.location.href = "home.html";
}
</script>

</body>
</html>
